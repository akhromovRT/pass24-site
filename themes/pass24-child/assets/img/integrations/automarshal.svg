<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 48" fill="currentColor">
  <!-- AutoMarshal — vehicle access control, license plate recognition -->
  <!-- License plate icon -->
  <rect x="2" y="8" width="44" height="26" rx="4" ry="4" fill="none" stroke="currentColor" stroke-width="2.2"/>
  <!-- Plate screws -->
  <circle cx="8" cy="14" r="1.8" fill="currentColor" opacity="0.35"/>
  <circle cx="40" cy="14" r="1.8" fill="currentColor" opacity="0.35"/>
  <!-- Plate text -->
  <text x="24" y="30" font-family="Arial, Helvetica, sans-serif" font-weight="900" font-size="12" text-anchor="middle" fill="currentColor">A 001</text>
  <!-- Main wordmark -->
  <text x="56" y="27" font-family="Arial, Helvetica, sans-serif" font-weight="400" font-size="22" fill="currentColor">Auto</text>
  <text x="112" y="27" font-family="Arial, Helvetica, sans-serif" font-weight="800" font-size="22" fill="currentColor">Marshal</text>
  <!-- Russian subtitle -->
  <text x="56" y="42" font-family="Arial, Helvetica, sans-serif" font-weight="400" font-size="10" letter-spacing="1.5" fill="currentColor" opacity="0.5">АВТОМАРШАЛ</text>
</svg>